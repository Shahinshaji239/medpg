services:
  - type: web
    name: aether-backend
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python seed_cars.py
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        from_predefined_var: random_string
      - key: GOOGLE_API_KEY
        sync: false # User must set this in dashboard
      - key: DATABASE_URL
        from_predefined_var: database_url
